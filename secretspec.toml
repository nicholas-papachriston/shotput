# App/dev runtime secrets (secretspec layer). extends ../dotfiles directly
# (matching admin.papachriston.com's and agent_oxide's precedent). Only
# shotput-only secrets declared below -- optional S3/R2 credentials for
# the S3 source-plugin integration tests/examples (env.example).

[project]
name = "shotput"
revision = "1.0"
extends = [ "../dotfiles" ]

[profiles.default]
S3_ACCESS_KEY_ID = { description = "S3/R2 access key for the S3 source plugin's integration tests/examples", required = false }
S3_SECRET_ACCESS_KEY = { description = "S3/R2 secret key for the S3 source plugin's integration tests/examples", required = false }
S3_SESSION_TOKEN = { description = "S3/R2 session token for temporary credentials", required = false }

[profiles.development]
